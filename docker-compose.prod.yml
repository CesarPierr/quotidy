name: quotidy-prod

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quotidy}
      POSTGRES_USER: ${POSTGRES_USER:-quotidy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set-postgres-password}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quotidy} -d ${POSTGRES_DB:-quotidy}"]
      interval: 15s
      timeout: 5s
      retries: 8

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-quotidy}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-quotidy}?schema=public
      APP_BASE_URL: ${APP_BASE_URL:?set-app-base-url}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Quotidy}
      NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-contact@example.com}
      NEXT_PUBLIC_SUPPORT_URL: ${NEXT_PUBLIC_SUPPORT_URL:-}
      AUTH_SECRET: ${AUTH_SECRET:?set-auth-secret}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      BILLING_ENABLED: ${BILLING_ENABLED:-0}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Europe/Paris}
      OCCURRENCE_PAST_DAYS: ${OCCURRENCE_PAST_DAYS:-30}
      OCCURRENCE_FUTURE_DAYS: ${OCCURRENCE_FUTURE_DAYS:-60}
      CSRF_SECRET: ${CSRF_SECRET:?set-csrf-secret}
      CRON_SECRET: ${CRON_SECRET:?set-cron-secret}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:admin@quotidy.fr}
      GITHUB_REPORT_REPO: ${GITHUB_REPORT_REPO:-}
      GITHUB_REPORT_TOKEN: ${GITHUB_REPORT_TOKEN:-}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
    command: sh -c "npx prisma migrate deploy && npm run start"

  reverse-proxy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    environment:
      APP_HOST: ${APP_HOST:?set-app-host}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./examples/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_prod_data:
    name: quotidy_postgres_prod_data
  caddy_data:
    name: quotidy_caddy_data
  caddy_config:
    name: quotidy_caddy_config
