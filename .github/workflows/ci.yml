name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint • Typecheck • Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hearthly
          POSTGRES_PASSWORD: hearthly
          POSTGRES_DB: hearthly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hearthly -d hearthly_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hearthly:hearthly@localhost:5432/hearthly_test?schema=public
      APP_BASE_URL: http://localhost:3000
      AUTH_SECRET: ci-only-not-secret
      CSRF_SECRET: ci-only-csrf-secret-32chars-long-aaaa
      DEFAULT_TIMEZONE: Europe/Paris

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder?schema=public
      APP_BASE_URL: http://localhost:3000
      AUTH_SECRET: ci-only-not-secret
      CSRF_SECRET: ci-only-csrf-secret-32chars-long-aaaa
      SKIP_ENV_VALIDATION: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
